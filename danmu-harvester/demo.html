<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>danmu-harvester Demo</title><style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,'Segoe UI','Microsoft YaHei',sans-serif;background:#f6f8fa;color:#1f2937;line-height:1.6}
.wrap{max-width:960px;margin:0 auto;padding:28px 20px 60px}
a{color:#2e8b57}
h1{font-size:22px;margin:0 0 4px}h2{font-size:16px;margin:28px 0 12px;color:#111827}
.sub{color:#6b7280;font-size:14px;margin-bottom:8px}
.back{display:inline-block;margin-bottom:16px;font-size:13px;text-decoration:none}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin:14px 0;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kpi{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px;text-align:center}
.kpi b{display:block;font-size:22px;color:#2e8b57}.kpi span{font-size:12px;color:#6b7280}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px 10px;border-bottom:1px solid #eef0f2;text-align:left}
th{background:#2e8b57;color:#fff;font-weight:600}
tr:hover td{background:#f9fafb}
.bar-row{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:13px}
.bar-label{width:120px;flex:0 0 120px;text-align:right;color:#374151}
.bar-track{flex:1;background:#eef2f0;border-radius:5px;overflow:hidden;height:18px}
.bar-fill{height:100%;background:linear-gradient(90deg,#2e8b57,#57c98a)}
.bar-val{width:70px;flex:0 0 70px;color:#6b7280;font-size:12px}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;background:#e8f5e9;color:#1b5e20}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
</style></head>
